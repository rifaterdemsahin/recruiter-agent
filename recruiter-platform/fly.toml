app = "recruiter-agent-rifat"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  # Secrets are set via fly secrets set:
  #   fly secrets set NEXT_PUBLIC_GEMINI_API_KEY="xxx" N8N_API_KEY="xxx" N8N_RTR_WEBHOOK_URL="https://n8n.rifaterdemsahin.com/webhook/rtr-notification"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
